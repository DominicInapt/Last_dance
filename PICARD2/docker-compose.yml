version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    env_file:             
      - .env
    #Persistent storage for mysql server
    volumes:
      - db_data:/var/lib/mysql
    #Not hardcoded, sourced from .env
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:5000
    #Always bring it up again
    restart: always
    env_file:             
      - .env
    #Suggested so that it can live update instead of rebuilding docker image.
    volumes:
      - ./backend:/app
      - ./spark-apps:/opt/bitnami/spark/apps:rw
    ports:
      - "5000:5000"
    #Needs to be able to write to the sparks_apps_dir as well.
    environment:
      - DATABASE_URL=mysql+pymysql://root:${DB_PASSWORD}@db/my_database
      - SPARK_SHARED_DIR=/opt/bitnami/spark/apps
    depends_on:
      db:
        condition: service_healthy
  celery_worker:
    build: ./backend
    command: celery -A backend_config worker --concurrency=1 --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - backend
    # We keep resources low since it's just "managing" the Spark service
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  # 3. The Message Broker (Required for Celery)
  redis:
    image: redis:alpine
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bubble-app1
    #Unfixed it and then fixed it :)
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  spark-master:
    image: apache/spark:3.5.8-scala2.12-java17-python3-ubuntu
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8080:8080" # Spark Master Web UI
      - "7077:7077" # Spark Master service port
    volumes:
      - ./spark-apps:/opt/spark/apps # Official image uses /opt/spark/
    command: /opt/spark/sbin/../bin/spark-class org.apache.spark.deploy.master.Master


  spark-worker:
    image: apache/spark:3.5.8-scala2.12-java17-python3-ubuntu
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8081:8081"
    volumes:
      - ./spark-apps:/opt/spark/apps
    command: /opt/spark/sbin/../bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  
    depends_on:
      - spark-master
volumes:
  db_data:
